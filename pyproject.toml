[tool.ruff]
line-length = 88
ignore = ["E203"]
select = ["E", "F", "W", "C", "I", "B"]
exclude = ["__pycache__", ".git", ".venv", "venv", "build", "dist", "android-grid-bot/data", "android-grid-bot/logs"]

[tool.ruff.per-file-ignores]
"tests/*" = ["D"]
"andriod_grid_bot_v1.py" = ["E501"]
"tests/test_reconcile.py" = ["E501"]
"tools/backtest.py" = ["E501"]
