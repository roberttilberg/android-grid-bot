name: CI
on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [3.11, 3.12, 3.13]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Cache ruff
        uses: actions/cache@v4
        with:
          path: ~/.cache/ruff
          key: ${{ runner.os }}-ruff-${{ hashFiles('**/pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-ruff-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f android-grid-bot/requirements-dev.txt ]; then
            pip install -r android-grid-bot/requirements-dev.txt
          elif [ -f android-grid-bot/requirements.txt ]; then
            pip install -r android-grid-bot/requirements.txt
          else
            pip install pytest ruff
          fi

      - name: Lint with ruff
        run: |
          ruff check android-grid-bot

      - name: Byte-compile critical modules
        run: |
          python -m py_compile android-grid-bot/andriod_grid_bot_v1.py android-grid-bot/db.py android-grid-bot/tests/test_reconcile.py android-grid-bot/tools/sim_reconcile_demo.py

      - name: Run tests
        run: |
          cd android-grid-bot
          python -m pytest -q
